<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ARES – Login</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>ARES</h1>
            <p>Sign in to your account</p>
        </div>

        <div class="login-method-toggle" id="loginMethodToggle">
            <button type="button" class="toggle-btn active" id="toggleEmail" data-method="email">Email</button>
            <button type="button" class="toggle-btn" id="togglePhone" data-method="phone">Phone</button>
        </div>

        <form id="loginForm">
            <div class="form-group" id="emailGroup">
                <label for="email">Email</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="you@example.com"
                    required
                />
            </div>

            <div class="form-group" id="phoneGroup" style="display: none;">
                <label for="phone">Phone</label>
                <input
                    type="tel"
                    id="phone"
                    name="phone"
                    placeholder="+90 555 123 4567"
                />
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="password-wrapper">
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Enter your password"
                        required
                    />
                    <button type="button" class="toggle-password" id="togglePassword">
                        Show
                    </button>
                </div>
            </div>

            <div class="recaptcha-wrapper" id="recaptchaWrapper" style="display: none;">
                <div id="recaptchaWidget"></div>
            </div>

            <button type="submit" class="btn-login" id="loginButton">
                Sign In
            </button>
        </form>

        <div class="divider"><span>or</span></div>

        <div class="social-buttons">
            <button type="button" class="btn-social btn-google" id="googleLogin">
                <svg viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Continue with Google
            </button>
            <button type="button" class="btn-social btn-github" id="githubLogin">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path fill="currentColor" d="M12 1.5a10.5 10.5 0 0 0-3.32 20.46c.53.1.72-.23.72-.5v-1.95c-2.95.64-3.57-1.25-3.57-1.25-.47-1.2-1.16-1.51-1.16-1.51-.95-.66.07-.64.07-.64 1.06.07 1.61 1.07 1.61 1.07.93 1.6 2.43 1.14 3.02.87.1-.69.37-1.14.66-1.4-2.36-.27-4.84-1.18-4.84-5.23 0-1.16.42-2.1 1.08-2.84-.11-.27-.47-1.37.1-2.86 0 0 .9-.29 2.96 1.08a10.28 10.28 0 0 1 5.4 0c2.05-1.37 2.95-1.08 2.95-1.08.58 1.5.22 2.6.11 2.86.67.74 1.08 1.68 1.08 2.84 0 4.06-2.49 4.96-4.86 5.22.38.32.72.95.72 1.92v2.84c0 .27.19.6.73.5A10.5 10.5 0 0 0 12 1.5z"/>
                </svg>
                Continue with GitHub
            </button>

        </div>

        <div id="errorMessage" class="error-message" style="display:none;"></div>
        <div id="warningMessage" class="warning-message" style="display:none;"></div>
        <div id="successMessage" class="success-message" style="display:none;"></div>
        <div id="riskPanel" class="risk-panel" style="display:none;"></div>

        <p class="signup-link">
            Don't have an account? <a href="signup.html">Sign Up</a>
        </p>
    </div>

    <script>
        const errorMessage = document.getElementById("errorMessage");
        const warningMessage = document.getElementById("warningMessage");
        const successMessage = document.getElementById("successMessage");
        const riskPanel = document.getElementById("riskPanel");
        const recaptchaWrapper = document.getElementById("recaptchaWrapper");
        const recaptchaWidget = document.getElementById("recaptchaWidget");
        let recaptchaConfigLoaded = false;
        let recaptchaEnabled = false;
        let recaptchaSiteKey = "";
        let recaptchaWidgetId = null;
        let challengeRequired = false;
        const loginButton = document.getElementById("loginButton");

        // Login method toggle (email vs phone)
        let loginMethod = "email";
        const emailGroup = document.getElementById("emailGroup");
        const phoneGroup = document.getElementById("phoneGroup");
        const emailInput = document.getElementById("email");
        const phoneInput = document.getElementById("phone");
        const toggleEmail = document.getElementById("toggleEmail");
        const togglePhone = document.getElementById("togglePhone");

        function setLoginMethod(method) {
            loginMethod = method;
            if (method === "email") {
                emailGroup.style.display = "";
                phoneGroup.style.display = "none";
                emailInput.required = true;
                phoneInput.required = false;
                phoneInput.value = "";
                toggleEmail.classList.add("active");
                togglePhone.classList.remove("active");
            } else {
                emailGroup.style.display = "none";
                phoneGroup.style.display = "";
                emailInput.required = false;
                phoneInput.required = true;
                emailInput.value = "";
                togglePhone.classList.add("active");
                toggleEmail.classList.remove("active");
            }
        }

        toggleEmail.addEventListener("click", () => setLoginMethod("email"));
        togglePhone.addEventListener("click", () => setLoginMethod("phone"));

        function hideAllMessages() {
            errorMessage.style.display = "none";
            warningMessage.style.display = "none";
            successMessage.style.display = "none";
            riskPanel.style.display = "none";
        }

        function waitForRecaptchaLibrary(timeoutMs = 5000) {
            return new Promise((resolve) => {
                const start = Date.now();
                const timer = setInterval(() => {
                    if (window.grecaptcha && typeof window.grecaptcha.render === "function") {
                        clearInterval(timer);
                        resolve(window.grecaptcha);
                        return;
                    }

                    if (Date.now() - start > timeoutMs) {
                        clearInterval(timer);
                        resolve(null);
                    }
                }, 100);
            });
        }

        async function loadRecaptchaConfig() {
            if (recaptchaConfigLoaded) {
                return;
            }
            recaptchaConfigLoaded = true;

            try {
                const res = await fetch("/api/recaptcha-config");
                if (!res.ok) return;
                const config = await res.json();

                if (!config.enabled || !config.site_key) {
                    return;
                }

                recaptchaEnabled = true;
                recaptchaSiteKey = config.site_key;
            } catch (_err) {
                recaptchaEnabled = false;
                recaptchaSiteKey = "";
            }
        }

        async function ensureRecaptchaVisible() {
            await loadRecaptchaConfig();
            if (!recaptchaEnabled || !recaptchaSiteKey) {
                errorMessage.textContent = "Security challenge is required but not configured.";
                errorMessage.style.display = "block";
                return false;
            }

            recaptchaWrapper.style.display = "flex";
            if (recaptchaWidgetId !== null) {
                return true;
            }

            const grecaptcha = await waitForRecaptchaLibrary();
            if (!grecaptcha) {
                errorMessage.textContent = "Security challenge failed to load. Disable blockers and refresh.";
                errorMessage.style.display = "block";
                return false;
            }

            recaptchaWidgetId = grecaptcha.render(recaptchaWidget, {
                sitekey: recaptchaSiteKey,
            });
            return true;
        }

        function showRiskPanel(data) {
            if (data.risk_score === undefined && !data.risk_factors && !data.fraud_analysis) return;

            let html = '<div class="risk-header">Risk Assessment</div>';

            if (data.risk_score !== undefined) {
                const level = data.risk_score >= 90 ? "critical" :
                              data.risk_score >= 75 ? "high" :
                              data.risk_score >= 50 ? "medium" : "low";
                html += `<div class="risk-score risk-${level}">Score: ${data.risk_score}/100 (${level.toUpperCase()})</div>`;
            }

            if (data.risk_factors && data.risk_factors.length > 0) {
                html += '<div class="risk-factors"><strong>Factors:</strong><ul>';
                data.risk_factors.forEach(f => {
                    html += `<li>${f}</li>`;
                });
                html += '</ul></div>';
            }

            if (data.fraud_analysis) {
                html += '<div class="fraud-analysis">';
                html += `<strong>LLM Fraud Analysis:</strong>`;
                html += `<div class="analysis-verdict">${data.fraud_analysis.verdict}</div>`;
                html += `<div class="analysis-reasoning">${data.fraud_analysis.reasoning}</div>`;
                html += '</div>';
            }

            riskPanel.innerHTML = html;
            riskPanel.style.display = "block";
        }

        document.getElementById("togglePassword").addEventListener("click", function () {
            const passwordInput = document.getElementById("password");
            const isHidden = passwordInput.type === "password";
            passwordInput.type = isHidden ? "text" : "password";
            this.textContent = isHidden ? "Hide" : "Show";
        });

        document.getElementById("loginForm").addEventListener("submit", async function (e) {
            e.preventDefault();
            hideAllMessages();

            const password = document.getElementById("password").value;
            const payload = { password };

            if (loginMethod === "email") {
                payload.email = document.getElementById("email").value.trim();
            } else {
                payload.phone = document.getElementById("phone").value.trim();
            }

            if (challengeRequired) {
                await ensureRecaptchaVisible();
                const recaptchaToken =
                    window.grecaptcha && recaptchaWidgetId !== null
                        ? window.grecaptcha.getResponse(recaptchaWidgetId)
                        : "";
                payload.recaptcha_token = recaptchaToken;
            }

            if (loginButton) {
                loginButton.disabled = true;
                loginButton.textContent = "Signing in...";
            }

            try {
                const res = await fetch("/api/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload),
                });

                const data = await res.json();

                if (!res.ok) {
                    errorMessage.textContent = data.error || "Login failed";
                    errorMessage.style.display = "block";

                    if (data.challenge_required) {
                        challengeRequired = true;
                        warningMessage.textContent = "Additional verification required. Complete reCAPTCHA and try again.";
                        warningMessage.style.display = "block";
                        await ensureRecaptchaVisible();
                    }

                    if (
                        challengeRequired &&
                        window.grecaptcha &&
                        recaptchaWidgetId !== null &&
                        (data.challenge_required || data.code === "recaptcha_failed")
                    ) {
                        window.grecaptcha.reset(recaptchaWidgetId);
                    }

                    if (data.warning) {
                        warningMessage.textContent = data.warning;
                        warningMessage.style.display = "block";
                    }

                    if (data.account_status === "locked") {
                        errorMessage.textContent = "Account locked due to suspicious activity. Contact support.";
                    } else if (data.account_status === "suspended") {
                        errorMessage.textContent = "Account is suspended. Contact support.";
                    }

                    showRiskPanel(data);
                    return;
                }

                successMessage.textContent = "Login successful!";
                successMessage.style.display = "block";
                showRiskPanel(data);
                challengeRequired = false;
                recaptchaWrapper.style.display = "none";
            } catch (err) {
                errorMessage.textContent = "Network error. Please try again.";
                errorMessage.style.display = "block";
            } finally {
                if (loginButton) {
                    loginButton.disabled = false;
                    loginButton.textContent = "Sign In";
                }
            }
        });

        // OAuth button
        document.getElementById("googleLogin").addEventListener("click", () => {
            window.location.href = "/api/login/google";
        });
        document.getElementById("githubLogin").addEventListener("click", () => {
            window.location.href = "/api/login/github";
        });

        // Check for OAuth redirect response
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get("login_success") === "true") {
            // Fetch user info from session instead of reading email from URL
            fetch("/api/me")
                .then(res => res.json())
                .then(data => {
                    if (data.email) {
                        successMessage.textContent = "OAuth Login successful! Email: " + data.email;
                    } else {
                        successMessage.textContent = "OAuth Login successful!";
                    }
                    successMessage.style.display = "block";
                })
                .catch(() => {
                    successMessage.textContent = "OAuth Login successful!";
                    successMessage.style.display = "block";
                });
            // Clean the URL to remove query params from browser history
            window.history.replaceState({}, document.title, "/index.html");
        } else if (urlParams.get("error")) {
            errorMessage.textContent = urlParams.get("error").replace(/\+/g, ' ');
            errorMessage.style.display = "block";
            window.history.replaceState({}, document.title, "/index.html");
        }

        loadRecaptchaConfig();
    </script>
</body>
</html>
